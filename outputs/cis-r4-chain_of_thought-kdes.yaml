element1:
  name: Kubelet
  requirements:
  - Ensure that logging, per the enterprise’s audit log management process, has been
    enabled across enterprise assets.
  - Ensure that local logging has been enabled on all systems and networking devices.
  - Ensure that system logging to include detailed information such as an event source,
    date, user, timestamp, source addresses, destination addresses, and other useful
    elements.
  - Ensure that the Kubelet service is configured to allow privileged containers to
    run.
  - Implement audit logging for Kubelet events.
  - Verify that the Kubelet is configured to allow privileged containers to access
    network interfaces.
  - Ensure that the Kubelet is configured to allow privileged containers to access
    the host's PID namespace.
  - Implement a mechanism for monitoring the Kubelet service for security events.
  - Ensure clusters are created with Private Endpoint Enabled
  - Ensure AmazonEKSNetworkingPolicy is Enabled
  - Ensure AmazonEKSNetworkingPolicy is set as appropriate
  - Ensure cluster-admin role is only used where required
element2:
  name: explicitly require API server access
  requirements:
  - 'References: 1. https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/'
element3:
  name: EphemeralContainers
  requirements:
  - Ensure that the EphemeralContainers service is configured to allow privileged
    containers to run.
  - Implement audit logging for EphemeralContainers events.
  - Verify that the EphemeralContainers service is configured to allow privileged
    containers to access network interfaces.
  - Ensure that the EphemeralContainers service is configured to allow privileged
    containers to access the host's PID namespace.
  - Implement a mechanism for monitoring the EphemeralContainers service for security
    events.
element4:
  name: IAM Authenticator
  requirements:
  - Ensure that all Namespaces have Network Policies defined.
